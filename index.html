<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STEP Face Painter – FaceID Mode</title>

    <script type="importmap">
    {
        "imports": {
            "three": "./libs/three/three.module.js",
            "three/examples/jsm/controls/OrbitControls.js": "./libs/three/OrbitControls.js"
        }
    }
    </script>
    <script src="./coi-serviceworker.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1e1e1e;
            color: #e0e0e0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }

        #viewer-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .floating-panel {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 28, 0.92);
            border: 1px solid #334;
            border-radius: 6px;
            padding: 0; /* ヘッダーとコンテンツで分けるため0に */
            z-index: 10;
            max-width: 60%;
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #parts-menu-header {
            padding: 8px 12px;
            background: rgba(30, 41, 59, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid #334;
        }

        .floating-panel .panel-title {
            font-size: 11px;
            text-transform: uppercase;
            color: #94a3b8;
            font-weight: bold;
            letter-spacing: 0.05em;
            margin-bottom: 0; /* マージンをリセット */
        }

        #parts-menu-toggle-icon {
            font-size: 10px;
            color: #94a3b8;
            transition: transform 0.2s ease;
        }

        /* 折りたたみ時のアイコン回転用 */
        .floating-panel.collapsed #parts-menu-toggle-icon {
            transform: rotate(180deg);
        }

        #parts-menu-content {
            padding: 10px 12px;
            max-height: 150px;
            overflow-y: auto;
            transition: max-height 0.2s ease, padding 0.2s ease;
        }

        /* 折りたたみ時はコンテンツを非表示に */
        .floating-panel.collapsed #parts-menu-content {
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
            overflow: hidden;
            border: none;
        }

        .bulk-actions {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            border-bottom: 1px solid #223;
            padding-bottom: 8px;
        }

        .mini-action-btn {
            background: #27273a;
            border: 1px solid #445;
            color: #cbd5e1;
            padding: 3px 8px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }

        .mini-action-btn:hover {
            background: #3b3b54;
            border-color: #64748b;
            color: #fff;
        }

        #partsContainer {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .part-check-label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: #e0e0e0;
            cursor: pointer;
            user-select: none;
        }

        #viewer {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* ドラッグオーバー時のハイライト */
        #viewer-container.dragover::after {
            content: 'STEPファイルをドロップ';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            background: rgba(80, 160, 255, 0.25);
            border: 3px dashed #50a0ff;
            pointer-events: none;
        }

        /* ローディングオーバーレイ */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid #334;
            padding: 20px 30px;
            border-radius: 8px;
            color: #fff;
            z-index: 100;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            min-width: 250px;
        }
        #loading-text {
            font-size: 14px;
            margin-bottom: 10px;
            font-weight: 500;
        }
        #progress-bar-container {
            width: 100%;
            height: 6px;
            background: #1e1e2f;
            border-radius: 3px;
            overflow: hidden;
            display: none; /* 必要に応じてJSで表示 */
        }
        #progress-bar-fill {
            width: 0%;
            height: 100%;
            background: #3b82f6; /* 青色のバー */
            transition: width 0.1s ease;
        }

        /* 共通サイドパネルベース */
        .sidebar-panel {
            position: absolute;
            top: 16px;
            max-height: calc(100vh - 32px); 
            background: rgba(20,20,28,0.92);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            z-index: 10;
            overflow-y: auto; 
            overflow-x: hidden; 
        }

        /* カスタムスクロールバー */
        .sidebar-panel::-webkit-scrollbar {
            width: 6px;
        }
        .sidebar-panel::-webkit-scrollbar-track {
            background: transparent;
        }
        .sidebar-panel::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 3px;
        }
        .sidebar-panel::-webkit-scrollbar-thumb:hover {
            background: #7dd3fc;
        }

        /* 左サイドパネル位置 */
        #sidebar {
            left: 16px;
            width: 220px;
        }

        /* 右サイドパネル位置 */
        #right-sidebar {
            right: 16px;
            width: 260px;
            top: 110px; /* 情報ボックスと被らないように配置 */
            max-height: calc(100vh - 130px);
        }

        .sidebar-panel h2 {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #7dd3fc;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
        }

        .ctrl-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .ctrl-row label {
            font-size: 0.72rem;
            color: #aaa;
            letter-spacing: 0.05em;
        }

        /* ファイルボタン */
        .file-btn {
            display: inline-block;
            background: #1e40af;
            color: #fff;
            font-size: 0.78rem;
            padding: 7px 12px;
            border-radius: 7px;
            cursor: pointer;
            text-align: center;
            transition: background 0.2s;
        }
        .file-btn:hover { background: #2563eb; }
        input[type="file"] { display: none; }

        /* カラーピッカー */
        #colorPicker {
            width: 100%;
            height: 34px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        /* パレット */
        .palette {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .palette-btn {
            width: 24px;
            height: 24px;
            border-radius: 5px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: border-color 0.15s, transform 0.1s;
        }
        .palette-btn:hover {
            border-color: #fff;
            transform: scale(1.15);
        }

        /* アクションボタン */
        .action-btn {
            background: #374151;
            color: #e0e0e0;
            border: 1px solid #4b5563;
            padding: 7px 10px;
            border-radius: 7px;
            font-size: 0.78rem;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            text-align: center;
        }
        .action-btn:hover { background: #4b5563; }
        .action-btn:disabled { opacity: 0.4; cursor: default; }

        /* ペイントモード用スタイル */
        .radio-group {
            display: flex;
            gap: 12px;
            margin-top: 2px;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            font-size: 0.78rem;
            color: #e0e0e0;
        }
        .radio-group input[type="radio"] {
            cursor: pointer;
        }

        /* 情報表示 */
        #info-box {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(20,20,28,0.92);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.76rem;
            color: #aaa;
            z-index: 10;
            min-width: 180px;
            line-height: 1.8;
        }
        #info-box span { color: #7dd3fc; font-weight: 600; }

        /* モード表示バッジ */
        #mode-badge {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20,20,28,0.88);
            border: 1px solid #334;
            border-radius: 999px;
            padding: 6px 18px;
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            color: #7dd3fc;
            z-index: 10;
            pointer-events: none;
        }

        /* 確認モーダル */
        #confirm-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        #confirm-modal-overlay.active {
            display: flex;
        }
        #confirm-modal {
            background: rgba(20, 20, 30, 0.98);
            border: 1px solid #4b5563;
            border-radius: 14px;
            padding: 28px 32px;
            width: 340px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
            animation: modal-in 0.18s ease;
        }
        @keyframes modal-in {
            from { opacity: 0; transform: scale(0.92); }
            to   { opacity: 1; transform: scale(1); }
        }
        #confirm-modal .modal-icon {
            font-size: 2rem;
            text-align: center;
        }
        #confirm-modal .modal-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #f1c40f;
            text-align: center;
            letter-spacing: 0.04em;
        }
        #confirm-modal .modal-body {
            font-size: 0.80rem;
            color: #aaa;
            line-height: 1.75;
            text-align: center;
        }
        #confirm-modal .modal-body strong {
            color: #e0e0e0;
        }
        #confirm-modal .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        #confirm-modal-cancel {
            flex: 1;
            background: #374151;
            color: #e0e0e0;
            border: 1px solid #4b5563;
            padding: 9px 0;
            border-radius: 8px;
            font-size: 0.82rem;
            cursor: pointer;
            transition: background 0.18s;
        }
        #confirm-modal-cancel:hover { background: #4b5563; }
        #confirm-modal-ok {
            flex: 1;
            background: #b45309;
            color: #fff;
            border: 1px solid #d97706;
            padding: 9px 0;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.18s;
        }
        #confirm-modal-ok:hover { background: #d97706; }

        /* タグリスト行のスタイル */
        .tag-row {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.03);
            padding: 6px;
            border-radius: 6px;
            border: 1px solid #2a2a35;
        }
        .tag-color-indicator {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            flex-shrink: 0;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .tag-input {
            flex-grow: 1;
            background: #111;
            border: 1px solid #444;
            color: #fff;
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 4px;
            width: 100%;
        }
        .tag-input:focus {
            border-color: #7dd3fc;
            outline: none;
        }
    </style>
</head>
<body>

<div id="viewer-container">
    <canvas id="viewer"></canvas>

    <div id="loading" style="display: none;">
        <div id="loading-text">Loading...</div>
        <div id="progress-bar-container">
            <div id="progress-bar-fill"></div>
        </div>
    </div>

    <div id="parts-menu" class="floating-panel">
        <div id="parts-menu-header">
            <span class="panel-title">パーツ表示切替</span>
            <span id="parts-menu-toggle-icon">▲</span>
        </div>
        <div id="parts-menu-content">
            <div class="bulk-actions">
                <button id="btn-check-all" class="mini-action-btn">全て表示</button>
                <button id="btn-uncheck-all" class="mini-action-btn">全て非表示</button>
            </div>
            <div id="partsContainer"></div>
        </div>
    </div>

    <div id="sidebar" class="sidebar-panel">
        <h2>STEP Face Painter</h2>

        <div class="ctrl-row">
            <label>STEPファイル</label>
            <label class="file-btn">
                📂 ファイルを開く
                <input type="file" id="stepFile" accept=".step,.stp" />
            </label>
        </div>

        <div class="ctrl-row">
            <label>ペイントモード</label>
            <div class="radio-group">
                <label><input type="radio" name="paintMode" value="face" checked /> 面</label>
                <label><input type="radio" name="paintMode" value="part" /> パーツ</label>
            </div>
        </div>

        <div class="ctrl-row">
            <label>ブラシカラー</label>
            <input type="color" id="colorPicker" value="#e74c3c" />
        </div>

        <div class="ctrl-row">
            <label>カラーパレット</label>
            <div class="palette">
                <button class="palette-btn" data-color="#e74c3c" style="background:#e74c3c" title="Red"></button>
                <button class="palette-btn" data-color="#e67e22" style="background:#e67e22" title="Orange"></button>
                <button class="palette-btn" data-color="#f1c40f" style="background:#f1c40f" title="Yellow"></button>
                <button class="palette-btn" data-color="#2ecc71" style="background:#2ecc71" title="Green"></button>
                <button class="palette-btn" data-color="#3498db" style="background:#3498db" title="Blue"></button>
                <button class="palette-btn" data-color="#9b59b6" style="background:#9b59b6" title="Purple"></button>
                <button class="palette-btn" data-color="#1abc9c" style="background:#1abc9c" title="Teal"></button>
                <button class="palette-btn" data-color="#ecf0f1" style="background:#ecf0f1" title="White"></button>
                <button class="palette-btn" data-color="#7f8c8d" style="background:#7f8c8d" title="Gray"></button>
                <button class="palette-btn" data-color="#b2bec3" style="background:#b2bec3" title="Silver"></button>
            </div>
        </div>

        <button class="action-btn" id="undoButton">↩ Undo</button>
        
        <button class="action-btn" id="toggleEdgesButton">エッジ表示切替</button>
        <button class="action-btn" id="toggleGridButton">グリッド非表示</button>

        <div class="ctrl-row">
            <label>視点切り替え</label>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px;">
                <button class="action-btn" id="viewPosX" style="padding: 4px;">+X</button>
                <button class="action-btn" id="viewPosY" style="padding: 4px;">+Y</button>
                <button class="action-btn" id="viewPosZ" style="padding: 4px;">+Z</button>
                <button class="action-btn" id="viewNegX" style="padding: 4px;">-X</button>
                <button class="action-btn" id="viewNegY" style="padding: 4px;">-Y</button>
                <button class="action-btn" id="viewNegZ" style="padding: 4px;">-Z</button>
            </div>
            <button class="action-btn" id="resetViewButton" style="margin-top: 4px; background: #57534e;">🔄 視点リセット</button>
            <button class="action-btn" id="centerButton" style="margin-top: 4px; background: #047857; border-color: #059669;">🎯 センタリング</button>
        </div>

        <div class="ctrl-row">
            <button class="action-btn" id="saveColorsButton">💾 カラーを保存</button>
            <label class="action-btn" style="display:block;cursor:pointer;">
                📥 カラーを読み込み
                <input type="file" id="importColorsFile" accept=".json" />
            </label>
        </div>
    </div>

    <div id="right-sidebar" class="sidebar-panel">
        <h2>Tag Information</h2>
        <div class="ctrl-row" style="gap: 8px;" id="tagFieldsContainer"></div>
    </div>

    <div id="info-box">
        Face ID: <span id="faceId">—</span><br>
        Surface: <span id="meshName">—</span><br>
        Triangles: <span id="triCount">—</span>
    </div>

    <button id="mode-badge" style="cursor: pointer; pointer-events: auto; transition: background 0.2s, border-color 0.2s;" title="クリックしてスクリーンショットを保存">
    📸 SCREENSHOT — opencascade.js
    </button>
</div>

<div id="confirm-modal-overlay">
    <div id="confirm-modal">
        <div class="modal-icon">⚠️</div>
        <div class="modal-title">モデルを置き換えますか？</div>
        <div class="modal-body">
            現在のモデルと<strong>すべての塗装データ</strong>が失われます。<br>
            続行する前に「カラーを保存」で<br>データをバックアップすることをお勧めします。
        </div>
        <div class="modal-actions">
            <button id="confirm-modal-cancel">キャンセル</button>
            <button id="confirm-modal-ok">置き換える</button>
        </div>
    </div>
</div>

<script type="module" src="./main.js"></script>
</body>
</html>
